    steps:
      - name: Déploiement à configurer
        run: |
          echo "Hébergement non encore défini."
          echo "Options recommandées : Railway ou Fly.io (support volumes persistants pour SQLite)"
          echo "Configurer les secrets GitHub : DEPLOY_HOST, DEPLOY_KEY, etc."
