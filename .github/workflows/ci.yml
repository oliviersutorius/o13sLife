name: CI/CD — o13sLife

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Qualité du code ────────────────────────────────────────────────────────
  lint:
    name: Lint (Laravel Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Vérifier le formatage (Pint)
        run: ./vendor/bin/pint --test

  # ─── Tests unitaires & intégration ─────────────────────────────────────────
  tests:
    name: Tests (Pest PHP)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite
          tools: composer
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Préparer l'environnement
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Lancer les tests avec couverture (seuil 95%)
        run: ./vendor/bin/pest --coverage --min=95 --ci

  # ─── Tests E2E & visuels ────────────────────────────────────────────────────
  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist

      - name: Installer les dépendances Node
        run: npm ci

      - name: Préparer l'environnement
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Build assets
        run: npm run build

      - name: Installer Playwright
        run: npx playwright install --with-deps chromium

      - name: Démarrer le serveur
        run: php artisan serve --port=8000 &

      - name: Lancer les tests Playwright
        run: npx playwright test

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ─── Tests de performance ───────────────────────────────────────────────────
  performance:
    name: Tests de charge (k6)
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite
          tools: composer

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances Node
        run: npm ci

      - name: Préparer l'environnement
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Build assets
        run: npm run build

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Démarrer le serveur
        run: php artisan serve --port=8000 &

      - name: Lancer les tests de charge
        run: k6 run tests/performance/load.js

  # ─── Audit de sécurité ──────────────────────────────────────────────────────
  security:
    name: Audit sécurité (Composer)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Audit des dépendances PHP
        run: composer audit

  # ─── Build final ────────────────────────────────────────────────────────────
  build:
    name: Build assets (Vite)
    runs-on: ubuntu-latest
    needs: [tests, e2e, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build de production
        run: npm run build

      - name: Upload artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build/

  # ─── Déploiement production (MANUEL) ────────────────────────────────────────
  deploy-production:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
